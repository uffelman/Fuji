name: macOS CI

on:
  pull_request:
  push:

jobs:
  build-and-test:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and test (unsigned)
        run: REQUIRE_TEST_TARGET=1 ALLOW_TEST_SKIP_FOR_OS_MISMATCH=1 ./scripts/ci-build-and-test.sh
