name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (for example: v0.1.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: [self-hosted, macOS, fuji-release]
    timeout-minutes: 60
    env:
      APP_NAME: Fuji
      PROJECT_PATH: Fuji.xcodeproj
      SCHEME: Fuji
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && (startsWith(inputs.tag, 'refs/') && inputs.tag || format('refs/tags/{0}', inputs.tag)) || github.ref }}
          fetch-depth: 0

      - name: Download Sparkle tools
        run: |
          set -euo pipefail
          SPARKLE_VERSION="2.9.0"
          curl -L -o "$RUNNER_TEMP/Sparkle.tar.xz" \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          mkdir -p "$RUNNER_TEMP/sparkle"
          tar -xf "$RUNNER_TEMP/Sparkle.tar.xz" -C "$RUNNER_TEMP/sparkle"
          echo "SPARKLE_BIN=$RUNNER_TEMP/sparkle/bin" >> "$GITHUB_ENV"

      - name: Set build paths
        run: |
          set -euo pipefail
          echo "ARCHIVE_PATH=$RUNNER_TEMP/Fuji.xcarchive" >> "$GITHUB_ENV"
          echo "EXPORT_PATH=$RUNNER_TEMP/export" >> "$GITHUB_ENV"

      - name: Build and test (unsigned)
        run: REQUIRE_TEST_TARGET=1 ALLOW_TEST_SKIP_FOR_OS_MISMATCH=1 ./scripts/ci-build-and-test.sh

      - name: Import Developer ID certificate
        env:
          DEVELOPER_ID_APP_P12_BASE64: ${{ secrets.DEVELOPER_ID_APP_P12_BASE64 }}
          DEVELOPER_ID_APP_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_APP_P12_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          LOGIN_KEYCHAIN_PATH="$(security login-keychain | tr -d '"')"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"

          echo "CI_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "CI_LOGIN_KEYCHAIN_PATH=$LOGIN_KEYCHAIN_PATH" >> "$GITHUB_ENV"

          echo "$DEVELOPER_ID_APP_P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" "$LOGIN_KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$DEVELOPER_ID_APP_P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/xcrun

          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

      - name: Archive app (Developer ID)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=macOS" \
            -archivePath "$ARCHIVE_PATH" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$VERSION" \
            archive

      - name: Export archived app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          EXPORT_OPTIONS_PLIST="$RUNNER_TEMP/ExportOptions.plist"
          cat > "$EXPORT_OPTIONS_PLIST" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
          </dict>
          </plist>
          PLIST

          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS_PLIST"

      - name: Notarize, staple, and package
        id: package
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_APP_PASSWORD: ${{ secrets.NOTARY_APP_PASSWORD }}
        run: |
          set -euo pipefail
          TAG="$RELEASE_TAG"
          if [[ ! "$TAG" =~ ^v ]]; then
            echo "Release tag must start with v (got: $TAG)" >&2
            exit 1
          fi
          APP_PATH="$EXPORT_PATH/$APP_NAME.app"
          NOTARY_ZIP="$RUNNER_TEMP/$APP_NAME-notary-$TAG.zip"
          FINAL_ZIP="$RUNNER_TEMP/$APP_NAME-$TAG-macos.zip"
          SHA_FILE="$RUNNER_TEMP/$APP_NAME-$TAG-macos.zip.sha256"

          if [[ ! -d "$APP_PATH" ]]; then
            echo "Expected app at $APP_PATH" >&2
            exit 1
          fi

          # Remove any AppleDouble sidecar files before packaging.
          find "$APP_PATH" -name '._*' -type f -delete

          ditto --norsrc -c -k --keepParent "$APP_PATH" "$NOTARY_ZIP"

          xcrun notarytool submit "$NOTARY_ZIP" \
            --apple-id "$NOTARY_APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$NOTARY_APP_PASSWORD" \
            --wait

          xcrun stapler staple "$APP_PATH"

          ditto --norsrc -c -k --keepParent "$APP_PATH" "$FINAL_ZIP"

          if zipinfo -1 "$FINAL_ZIP" | grep -Eq '(^__MACOSX/|/\._)'; then
            echo "Final ZIP contains AppleDouble entries (._*) or __MACOSX metadata." >&2
            exit 1
          fi

          shasum -a 256 "$FINAL_ZIP" > "$SHA_FILE"

          echo "final_zip=$FINAL_ZIP" >> "$GITHUB_OUTPUT"
          echo "sha_file=$SHA_FILE" >> "$GITHUB_OUTPUT"

      - name: Sign update with EdDSA
        id: sign_update
        env:
          SPARKLE_EDDSA_PRIVATE_KEY: ${{ secrets.SPARKLE_EDDSA_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          FINAL_ZIP="${{ steps.package.outputs.final_zip }}"

          SIGN_OUTPUT=$("$SPARKLE_BIN/sign_update" "$FINAL_ZIP" \
            --ed-key-file <(echo "$SPARKLE_EDDSA_PRIVATE_KEY"))

          ED_SIGNATURE=$(echo "$SIGN_OUTPUT" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')
          FILE_LENGTH=$(echo "$SIGN_OUTPUT" | sed -n 's/.*length="\([^"]*\)".*/\1/p')

          echo "ed_signature=$ED_SIGNATURE" >> "$GITHUB_OUTPUT"
          echo "file_length=$FILE_LENGTH" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="$RELEASE_TAG"
          if [[ ! "$TAG" =~ ^v ]]; then
            echo "Release tag must start with v (got: $TAG)" >&2
            exit 1
          fi
          FINAL_ZIP="${{ steps.package.outputs.final_zip }}"
          SHA_FILE="${{ steps.package.outputs.sha_file }}"

          # Create a stable-name copy so /releases/latest/download/Fuji.zip always works
          STABLE_ZIP="$RUNNER_TEMP/Fuji.zip"
          cp "$FINAL_ZIP" "$STABLE_ZIP"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$FINAL_ZIP" "$SHA_FILE" "$STABLE_ZIP" --clobber
          else
            gh release create "$TAG" "$FINAL_ZIP" "$SHA_FILE" "$STABLE_ZIP" \
              --title "$TAG" \
              --notes "Automated release for $TAG."
          fi

      - name: Update appcast on GitHub Pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="$RELEASE_TAG"
          VERSION="${TAG#v}"
          FINAL_ZIP="${{ steps.package.outputs.final_zip }}"
          ZIP_FILENAME="$(basename "$FINAL_ZIP")"
          ED_SIGNATURE="${{ steps.sign_update.outputs.ed_signature }}"
          FILE_LENGTH="${{ steps.sign_update.outputs.file_length }}"
          DOWNLOAD_URL="https://github.com/uffelman/Fuji/releases/download/${TAG}/${ZIP_FILENAME}"
          PUB_DATE="$(date -u '+%a, %d %b %Y %H:%M:%S %z')"

          NEW_ITEM_FILE="$RUNNER_TEMP/new-item.xml"
          cat > "$NEW_ITEM_FILE" <<EOF
                  <item>
                      <title>Version ${VERSION}</title>
                      <pubDate>${PUB_DATE}</pubDate>
                      <sparkle:version>${VERSION}</sparkle:version>
                      <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                      <sparkle:minimumSystemVersion>26.0</sparkle:minimumSystemVersion>
                      <enclosure
                          url="${DOWNLOAD_URL}"
                          type="application/octet-stream"
                          sparkle:edSignature="${ED_SIGNATURE}"
                          length="${FILE_LENGTH}"
                      />
                  </item>
          EOF

          PAGES_DIR="$RUNNER_TEMP/gh-pages"

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git clone --branch gh-pages --single-branch \
              "https://x-access-token:${GH_TOKEN}@github.com/uffelman/Fuji.git" \
              "$PAGES_DIR"
          else
            mkdir -p "$PAGES_DIR/updates"
            cd "$PAGES_DIR"
            git init
            git checkout -b gh-pages
            git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/uffelman/Fuji.git"
            touch .nojekyll
            cd -
          fi

          APPCAST="$PAGES_DIR/updates/appcast.xml"
          mkdir -p "$PAGES_DIR/updates"

          if [[ -f "$APPCAST" ]]; then
            FILTERED_APPCAST="$APPCAST.filtered"

            # Remove any existing item for this version (reruns of same tag).
            awk -v version="$VERSION" '
              BEGIN { in_item = 0; item_has_version = 0; item_buf = "" }
              /<item>/ {
                in_item = 1
                item_has_version = 0
                item_buf = $0 ORS
                next
              }
              in_item {
                item_buf = item_buf $0 ORS
                if ($0 ~ "<sparkle:version>" version "</sparkle:version>") {
                  item_has_version = 1
                }
                if ($0 ~ /<\/item>/) {
                  in_item = 0
                  if (!item_has_version) {
                    printf "%s", item_buf
                  }
                }
                next
              }
              { print }
            ' "$APPCAST" > "$FILTERED_APPCAST"

            # Insert new item before </channel>.
            awk '
              NR==FNR { item = item $0 ORS; next }
              /<\/channel>/ { printf "%s", item }
              { print }
            ' "$NEW_ITEM_FILE" "$FILTERED_APPCAST" > "$APPCAST"
          else
            cat > "$APPCAST" <<APPCAST_EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
              <channel>
                  <title>Fuji Updates</title>
                  <link>https://uffelman.github.io/Fuji/updates/appcast.xml</link>
                  <description>Updates for Fuji</description>
                  <language>en</language>
          APPCAST_EOF
            cat "$NEW_ITEM_FILE" >> "$APPCAST"
            cat >> "$APPCAST" <<APPCAST_EOF
              </channel>
          </rss>
          APPCAST_EOF
          fi

          if ! grep -q "<sparkle:version>${VERSION}</sparkle:version>" "$APPCAST"; then
            echo "Failed to insert ${VERSION} into appcast" >&2
            exit 1
          fi

          cd "$PAGES_DIR"
          git add -A
          git -c user.name="github-actions[bot]" \
              -c user.email="github-actions[bot]@users.noreply.github.com" \
              commit -m "Update appcast for ${TAG}" || echo "No changes to commit"
          git push origin gh-pages

      - name: Cleanup temporary keychain
        if: ${{ always() }}
        run: |
          set -euo pipefail
          if [[ -n "${CI_LOGIN_KEYCHAIN_PATH:-}" ]]; then
            security list-keychains -d user -s "$CI_LOGIN_KEYCHAIN_PATH" || true
            security default-keychain -d user -s "$CI_LOGIN_KEYCHAIN_PATH" || true
          fi
          if [[ -n "${CI_KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "$CI_KEYCHAIN_PATH" || true
          fi
          rm -f "$RUNNER_TEMP/developer-id.p12" || true
